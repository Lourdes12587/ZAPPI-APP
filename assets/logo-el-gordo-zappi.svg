<svg width="220" height="72" viewBox="0 0 220 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">El Gordo Zappi</title>
  <desc id="desc">Logo con una pizza caliente y el monograma EGZ.</desc>
  <defs>
    <linearGradient id="flame" x1="12" y1="8" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA100"/>
      <stop offset="1" stop-color="#FB103D"/>
    </linearGradient>
    <linearGradient id="slice" x1="24" y1="21" x2="55" y2="55" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE28A"/>
      <stop offset="1" stop-color="#FFA100"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="84" height="84" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="8" y="8" width="56" height="56" rx="18" fill="url(#flame)"/>
    <path d="M22 23.5C32.5 19 45.5 20.5 54 29.5C48.8 36.5 41.9 45.3 34.8 55.5C30.4 45 25.9 33.7 22 23.5Z" fill="url(#slice)"/>
    <path d="M22 23.5C32.5 19 45.5 20.5 54 29.5" stroke="#FFF4D0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="36" cy="31" r="3.2" fill="#FB103D"/>
    <circle cx="43.5" cy="39" r="3" fill="#FB103D"/>
    <circle cx="33" cy="43.5" r="2.8" fill="#252525"/>
    <path d="M35.5 55.5L38 46.6" stroke="#FFF4D0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <text x="76" y="31" fill="#FFFFFF" font-family="Lato, Arial, sans-serif" font-size="21" font-weight="900" letter-spacing="0">El Gordo</text>
    <text x="76" y="54" fill="#FFA100" font-family="Lato, Arial, sans-serif" font-size="25" font-weight="900" letter-spacing="0">Zappi</text>
    <path d="M152 51H198" stroke="url(#flame)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="207" cy="51" r="4" fill="#FB103D"/>
